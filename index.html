<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Harvest Run — Once Upon a Farm</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100vh; overflow-x: hidden; font-family: 'Nunito', 'Quicksand', 'Comic Sans MS', sans-serif; }

  /* ── Page sky background ── */
  body {
    background: linear-gradient(to bottom, #5BABD8 0%, #87CEEB 40%, #A8DCF0 70%, #BDE4F4 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ── Page sun ── */
  .page-sun {
    position: absolute;
    top: 5%;
    right: 8%;
    width: 70px;
    height: 70px;
    background: #FFD93D;
    border-radius: 50%;
    box-shadow: 0 0 40px 15px rgba(255,217,61,0.3), 0 0 80px 30px rgba(255,217,61,0.12);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Page clouds ── */
  .page-cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
  }
  .page-cloud::before, .page-cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 44px; top: 8%; left: 5%; }
  .cloud-1::before { width: 65px; height: 50px; top: -22px; left: 22px; }
  .cloud-1::after { width: 48px; height: 34px; top: -12px; left: 64px; }
  .cloud-2 { width: 90px; height: 36px; top: 18%; right: 18%; }
  .cloud-2::before { width: 50px; height: 42px; top: -20px; left: 16px; }
  .cloud-2::after { width: 38px; height: 28px; top: -10px; left: 48px; }
  .cloud-3 { width: 70px; height: 28px; top: 5%; left: 38%; }
  .cloud-3::before { width: 40px; height: 34px; top: -16px; left: 12px; }
  .cloud-3::after { width: 30px; height: 22px; top: -8px; left: 36px; }
  .cloud-4 { width: 100px; height: 38px; bottom: 22%; left: 12%; }
  .cloud-4::before { width: 55px; height: 44px; top: -20px; left: 20px; }
  .cloud-4::after { width: 42px; height: 30px; top: -10px; left: 55px; }

  /* ── Page title ── */
  .page-header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }
  .page-title {
    font-size: 52px;
    font-weight: 900;
    color: #FFFDF7;
    text-shadow: 0 3px 12px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.1);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .page-subtitle {
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.12);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ── Game box ── */
  .game-wrapper {
    width: 900px;
    max-width: 95vw;
    position: relative;
    z-index: 2;
  }
  .game-frame {
    width: 100%;
    aspect-ratio: 900 / 500;
    border-radius: 20px;
    border: 5px solid #A1887F;
    background: linear-gradient(135deg, #BCAAA4 0%, #8D6E63 100%);
    padding: 3px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
    overflow: hidden;
  }
  .game-frame canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    touch-action: none;
  }
</style>
</head>
<body>

<!-- Page decorations -->
<div class="page-sun"></div>

<div class="page-cloud cloud-2"></div>
<div class="page-cloud cloud-3"></div>

<!-- Page header -->

<script>
// ═══════════════════════════════════════
// HARVEST RUN — Once Upon a Farm
// ═══════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ── Fixed game dimensions ──
const GAME_W = 900;
const GAME_H = 500;

function resize() {
  canvas.width = GAME_W * devicePixelRatio;
  canvas.height = GAME_H * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const W = () => GAME_W;
const H = () => GAME_H;

// ── Font ──
const FONT = '"Nunito", "Quicksand", "Comic Sans MS", "Trebuchet MS", sans-serif';

// Font loaded via CSS @import

// ── Grain texture system ──
function createGrainTexture(baseColor, width, height, speckCount) {
  const c = document.createElement('canvas');
  c.width = width || 200;
  c.height = height || 200;
  const g = c.getContext('2d');
  g.fillStyle = baseColor;
  g.fillRect(0, 0, c.width, c.height);
  const count = speckCount || 800;
  for (let i = 0; i < count; i++) {
    const gx = Math.random() * c.width;
    const gy = Math.random() * c.height;
    const bright = Math.random() > 0.5;
    const alpha = 0.03 + Math.random() * 0.12;
    g.fillStyle = bright
      ? `rgba(255,255,255,${alpha})`
      : `rgba(0,0,0,${alpha})`;
    g.beginPath();
    g.arc(gx, gy, 1, 0, Math.PI * 2);
    g.fill();
  }
  return ctx.createPattern(c, 'repeat');
}

// Pre-create grain patterns for each surface
const grainSky = createGrainTexture('#C8E8F0', 200, 200, 200);
const grainFarHill = createGrainTexture('#8BC4A0', 200, 200, 800);
const grainMidHill = createGrainTexture('#5BAF6E', 200, 200, 800);
const grainNearHill = createGrainTexture('#3D9E52', 200, 200, 800);
const grainGround = createGrainTexture('#2A7A3A', 200, 200, 900);
const grainForeground = createGrainTexture('#2D8A42', 200, 200, 900);
const grainCream = createGrainTexture('#FFF8EC', 200, 200, 400);
const grassPattern = grainGround;

// ── Colors ──
const COL = {
  sky1: '#87CEEB', sky2: '#E8F4FD', sky3: '#FFF8E7',
  sun: '#FFD93D', sunGlow: 'rgba(255,217,61,0.3)',
  ground: '#8BC34A', groundDark: '#6D9B2F', dirt: '#8B6914',
  cloud: '#F8F8F8', cloudShadow: 'rgba(0,0,0,0.05)',
  tree: '#4CAF50', treeDark: '#2E7D32', trunk: '#795548',
  barn: '#D32F2F', barnRoof: '#B71C1C', barnDoor: '#5D4037',
  fence: '#BCAAA4',
  farmer: '#FDDCB5', farmerHair: '#8B5E3C', farmerHat: '#D4A843', farmerHatBrim: '#C49A38',
  farmerShirt: '#87CEEB', farmerOveralls: '#5B8DBE', farmerOverallsDark: '#4A7AAB',
  farmerBoots: '#2C3E6B', farmerBlush: 'rgba(255,130,130,0.35)',
  farmerBuckle: '#D0D0D0',
  pouchBase: '#FF8A65', pouchCap: '#4CAF50',
  hudBg: 'rgba(255,255,255,0.55)', hudBorder: 'rgba(255,255,255,0.6)', hudShadow: 'rgba(0,0,0,0.06)',
  accent: '#FF6F00', accentLight: '#FFB74D',
  textDark: '#3E2723', textMed: '#5D4037', textLight: '#8D6E63',
  check: '#4CAF50',
  sparkle: '#FFD700',
  confetti: ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#FF8A65','#81C784']
};

// ── Ingredient Colors ──
const INGR_COLORS = {
  Apple: { fill: '#E53935', stem: '#4CAF50', highlight: '#EF9A9A' },
  Carrot: { fill: '#FF9800', leaf: '#4CAF50' },
  Beetroot: { fill: '#880E4F', highlight: '#E91E63' },
  Flax: { fill: '#FFD54F', stem: '#8D6E63' },
  Strawberry: { fill: '#E53935', seed: '#FFD54F', leaf: '#4CAF50' },
  Coconut: { fill: '#8D6E63', highlight: '#D7CCC8', eye1: '#3E2723', eye2: '#3E2723' },
  Squash: { fill: '#FF9800', stem: '#689F38', highlight: '#FFE0B2' },
  Pear: { fill: '#8BC34A', stem: '#795548', highlight: '#C5E1A5' },
  Blueberry: { fill: '#3F51B5', highlight: '#9FA8DA', crown: '#283593' },
  Spinach: { fill: '#388E3C', vein: '#1B5E20' },
  Pumpkin: { fill: '#FF6F00', stem: '#4CAF50', line: '#E65100' },
  Pineapple: { fill: '#FFD54F', pattern: '#FF8F00', leaf: '#4CAF50' },
  Banana: { fill: '#FFEB3B', stem: '#8D6E63', highlight: '#FFF9C4' },
  Dragonfruit: { fill: '#E91E63', scale: '#F48FB1', flesh: '#FAFAFA', seed: '#212121' },
  Mango: { fill: '#FF9800', blush: '#F44336', highlight: '#FFE0B2' },
  Orange: { fill: '#FF9800', highlight: '#FFE0B2', nub: '#689F38' },
  Guava: { fill: '#8BC34A', blush: '#F48FB1', highlight: '#C5E1A5' },
};

// ── Pouches ──
const POUCHES = [
  { name: 'OhMyMega\nVeggie!', ingredients: ['Apple','Carrot','Beetroot','Flax'], color: '#66BB6A', outline: '#2D7A2D' },
  { name: 'Strawberry\nPatch', ingredients: ['Strawberry','Coconut','Squash','Apple'], color: '#EF5350', outline: '#A01515' },
  { name: 'Pear-y\nBlueberry', ingredients: ['Pear','Blueberry','Spinach','Pumpkin'], color: '#7E57C2', outline: '#2D4F8C' },
  { name: 'Dragon Fruit\nImmunity', ingredients: ['Pineapple','Banana','Dragonfruit','Spinach'], color: '#EC407A', outline: '#8C1A5A' },
  { name: 'Guava Belly\nBlend', ingredients: ['Mango','Orange','Guava','Pineapple'], color: '#FFA726', outline: '#CC5500' },
];

// ── Audio ──
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type='sine', vol=0.15, delay=0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + delay);
  osc.stop(audioCtx.currentTime + delay + duration);
}

function sfxCollect() {
  playTone(523, 0.12, 'sine', 0.13);
  playTone(659, 0.12, 'sine', 0.13, 0.06);
  playTone(784, 0.15, 'sine', 0.11, 0.12);
}

function sfxPouch() {
  playTone(523, 0.15, 'triangle', 0.12);
  playTone(659, 0.15, 'triangle', 0.12, 0.08);
  playTone(784, 0.15, 'triangle', 0.12, 0.16);
  playTone(1047, 0.25, 'triangle', 0.10, 0.24);
}

function sfxGameOver() {
  playTone(440, 0.2, 'sine', 0.12);
  playTone(370, 0.2, 'sine', 0.10, 0.15);
  playTone(330, 0.3, 'sine', 0.08, 0.30);
}

function sfxWin() {
  [523,659,784,1047,784,1047,1319].forEach((f,i) => {
    playTone(f, 0.18, 'sine', 0.10, i*0.08);
  });
}

// ── Game State ──
let state = 'start'; // start, playing, gameover
let gameTime = 0;
let speed = 4.5;
const BASE_SPEED = 4.5;
let groundY;
let farmer, obstacles, ingredients, sparkles, confettiParts;
let currentPouch, collectedIngredients, completedPouches;
let gameOverTimer, gameOverAlpha;
let scrollX = 0;

// ── Background elements ──
let clouds = [];
let bgTrees = [];
let bgFences = [];
let hills = [];

function initBackground() {
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({ x: Math.random() * W() * 2, y: 30 + Math.random() * H() * 0.18, w: 60 + Math.random() * 80, speed: 0.15 + Math.random() * 0.25 });
  }
  hills = [
    { offset: 0, pattern: grainFarHill, scrollMul: 0.08, amplitude: 0.10, freq: 0.0025, baseY: 0.38 },
    { offset: 150, pattern: grainMidHill, scrollMul: 0.15, amplitude: 0.08, freq: 0.004, baseY: 0.45 },
    { offset: 80, pattern: grainNearHill, scrollMul: 0.25, amplitude: 0.06, freq: 0.006, baseY: 0.52 },
  ];
  // Lollipop trees on mid-ground layer
  bgTrees = [];
  const tw = W();
  const treeSpacing = tw / 3.5;
  for (let i = 0; i < 8; i++) {
    // Pre-generate random fruit positions for each tree
    const fruits = [];
    const numFruits = 5 + Math.floor(Math.random() * 3);
    for (let f = 0; f < numFruits; f++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 18;
      fruits.push({
        dx: Math.cos(angle) * dist,
        dy: Math.sin(angle) * dist,
        color: Math.random() > 0.4 ? '#E8607A' : '#F0A0B0',
        r: Math.random() > 0.5 ? 4 : 3,
      });
    }
    bgTrees.push({
      x: i * treeSpacing + Math.random() * 60,
      heightVar: -5 + Math.random() * 10,
      fruits,
    });
  }
  bgFences = [];
  for (let i = 0; i < 30; i++) {
    bgFences.push({ x: i * 80 });
  }
}

function initGame() {
  groundY = H() * 0.65;
  farmer = {
    x: W() * 0.15,
    y: groundY,
    w: 40, h: 56,
    vy: 0,
    jumping: false,
    runFrame: 0,
    runTimer: 0,
    idleTimer: 0,
  };
  obstacles = [];
  ingredients = [];
  sparkles = [];
  confettiParts = [];
  currentPouch = 0;
  collectedIngredients = [[], [], [], [], []];
  completedPouches = [false, false, false, false, false];
  speed = BASE_SPEED;
  gameTime = 0;
  scrollX = 0;
  gameOverTimer = 0;
  gameOverAlpha = 0;
  distanceTravelled = 0;
  nextSpawnX = 800;
  spawnStep = 0;
  pouchCelebration = null;
  initBackground();
}

// ── Pouch Celebration State ──
let pouchCelebration = null;

function startPouchCelebration(completedIndex) {
  pouchCelebration = {
    frame: 0,
    totalFrames: 180, // ~3 seconds at 60fps
    completedIndex: completedIndex,
    nextIndex: completedIndex + 1,
    pouchColor: POUCHES[completedIndex].color,
    pouchName: POUCHES[completedIndex].name.replace('\n', ' '),
    slotReveal: [0, 0, 0, 0], // opacity for each slot during transition
  };
}

// ── Spawning ──
const SPAWN_BASE_SPACING = 700;
const SPAWN_MIN_SPACING = 500;
let distanceTravelled = 0;
let nextSpawnX = 800;          // first spawn after 800px
let spawnStep = 0;             // 0 = ingredient, 1 = gap, 2 = obstacle, 3 = gap

const OBSTACLE_TYPES = ['rock', 'hay', 'crate', 'bush', 'pumpkinObs'];

function spawnObstacle() {
  const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  let w, h;
  switch(type) {
    case 'rock': w = 35; h = 30; break;
    case 'hay': w = 42; h = 36; break;
    case 'crate': w = 32; h = 32; break;
    case 'bush': w = 44; h = 28; break;
    case 'pumpkinObs': w = 30; h = 28; break;
    default: w = 34; h = 30;
  }
  obstacles.push({ x: W() + 50, y: groundY - h, w, h, type });
}

function getCurrentNeededIngredient() {
  if (currentPouch >= 5) return null;
  const pouch = POUCHES[currentPouch];
  const collected = collectedIngredients[currentPouch];
  for (const ingr of pouch.ingredients) {
    if (!collected.includes(ingr)) return ingr;
  }
  return null;
}

function spawnIngredient() {
  const needed = getCurrentNeededIngredient();
  if (!needed) return;
  const jumpPeakY = groundY - 130;
  ingredients.push({
    x: W() + 50,
    y: jumpPeakY,
    w: 28, h: 28,
    name: needed,
    bobTimer: Math.random() * Math.PI * 2,
    baseY: jumpPeakY,
  });
}

// ── Drawing helpers ──
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function pillRect(x, y, w, h) {
  roundRect(x, y, w, h, h / 2);
}

// ── Draw lollipop tree ──
function drawLollipopTree(x, baseY, tree) {
  const trunkW = 8, trunkH = 28;
  const canopyR = 26;
  const treeTop = baseY - trunkH - canopyR + tree.heightVar;

  // Trunk
  ctx.fillStyle = '#5C3D1E';
  ctx.fillRect(x - trunkW / 2, treeTop + canopyR, trunkW, trunkH);

  // Canopy circle with grain
  ctx.fillStyle = '#2D8A3E';
  ctx.beginPath();
  ctx.arc(x, treeTop, canopyR, 0, Math.PI * 2);
  ctx.fill();
  // Canopy grain overlay
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, treeTop, canopyR, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = grainNearHill;
  ctx.fillRect(x - canopyR, treeTop - canopyR, canopyR * 2, canopyR * 2);
  ctx.restore();
  // Subtle highlight on canopy
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.arc(x - 6, treeTop - 8, canopyR * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // Fruit dots
  tree.fruits.forEach(f => {
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.arc(x + f.dx, treeTop + f.dy, f.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── Draw Background ──
function drawBackground() {
  const w = W(), h = H();

  // Sky with grain texture
  ctx.fillStyle = '#C8E8F0';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = grainSky;
  ctx.fillRect(0, 0, w, h);

  // 3-layer parallax hills
  const hillLoopW = w * 1.5;
  hills.forEach((hill, li) => {
    const offset = state === 'playing' ? (scrollX * hill.scrollMul + hill.offset) % hillLoopW : hill.offset;
    ctx.fillStyle = hill.pattern;

    ctx.beginPath();
    for (let px = -50; px <= w + 50; px += 4) {
      const worldX = px + offset;
      const hillY = groundY * hill.baseY / 0.65
        + Math.sin(worldX * hill.freq) * h * hill.amplitude
        + Math.sin(worldX * hill.freq * 2.3 + 1.5) * h * hill.amplitude * 0.4;
      if (px === -50) ctx.moveTo(px, hillY);
      else ctx.lineTo(px, hillY);
    }
    ctx.lineTo(w + 50, h);
    ctx.lineTo(-50, h);
    ctx.closePath();
    ctx.fill();

    // Draw lollipop trees on mid-ground layer (index 1) only
    if (li === 1) {
      const treeLoopW = bgTrees.length > 0 ? bgTrees[bgTrees.length - 1].x + w / 3.5 : w;
      bgTrees.forEach(tree => {
        const tx = ((tree.x - offset * (hill.scrollMul / 0.15)) % treeLoopW + treeLoopW) % treeLoopW - 50;
        if (tx < -60 || tx > w + 60) return;
        const worldTX = tx + offset;
        const treeBaseY = groundY * hill.baseY / 0.65
          + Math.sin(worldTX * hill.freq) * h * hill.amplitude
          + Math.sin(worldTX * hill.freq * 2.3 + 1.5) * h * hill.amplitude * 0.4;
        drawLollipopTree(tx, treeBaseY, tree);
      });
    }
  });

  // Foreground ground strip with grain
  ctx.fillStyle = grainForeground;
  ctx.fillRect(0, groundY, w, h - groundY);

  // Runway darker ground with grain
  ctx.fillStyle = grainGround;
  ctx.fillRect(0, groundY + 4, w, h - groundY - 4);

  // Top edge shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, groundY, w, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, groundY + 3, w, 2);

  // Dirt layer
  ctx.fillStyle = COL.dirt;
  ctx.fillRect(0, h - (h - groundY) * 0.15, w, (h - groundY) * 0.15);

  // Rustic farm fence
  const fenceY = groundY - 2;
  const picketW = 10, picketH = 44, picketGap = 20;
  const picketSpacing = picketW + picketGap;
  const railH = 4;
  const fenceTop = fenceY - picketH;
  const fenceBaseColor = '#F8F4EC';
  const fenceOutline = 'rgba(0,0,0,0.12)';
  const fenceGrainColor = 'rgba(190,180,160,0.25)';

  const fenceScrollOff = state === 'playing' ? (scrollX * 0.6) % picketSpacing : 0;

  const rail1Y = fenceTop + 12;
  const rail2Y = fenceTop + 28;
  ctx.fillStyle = fenceBaseColor;
  ctx.fillRect(0, rail1Y, w, railH);
  ctx.fillRect(0, rail2Y, w, railH);
  ctx.strokeStyle = fenceOutline;
  ctx.lineWidth = 0.8;
  ctx.strokeRect(0, rail1Y, w, railH);
  ctx.strokeRect(0, rail2Y, w, railH);

  for (let px = -picketSpacing; px < w + picketSpacing; px += picketSpacing) {
    const x = px - fenceScrollOff;
    if (x < -picketW || x > w + picketW) continue;

    ctx.fillStyle = fenceBaseColor;
    roundRect(x, fenceTop, picketW, picketH, 3);
    ctx.fill();

    ctx.strokeStyle = fenceOutline;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    ctx.strokeStyle = fenceGrainColor;
    ctx.lineWidth = 0.6;
    const seed = Math.abs((px * 31) | 0) % 256;
    for (let g = 0; g < 2; g++) {
      const gx = x + 3 + ((seed + g * 41) % (picketW - 5));
      ctx.beginPath();
      ctx.moveTo(gx, fenceTop + 10);
      ctx.lineTo(gx, fenceY - 2);
      ctx.stroke();
    }
  }
}

function drawCloud(x, y, w) {
  ctx.fillStyle = COL.cloud;
  ctx.beginPath();
  ctx.arc(x, y, w * 0.3, 0, Math.PI * 2);
  ctx.arc(x + w * 0.25, y - w * 0.15, w * 0.35, 0, Math.PI * 2);
  ctx.arc(x + w * 0.55, y - w * 0.05, w * 0.28, 0, Math.PI * 2);
  ctx.arc(x + w * 0.35, y + w * 0.05, w * 0.25, 0, Math.PI * 2);
  ctx.fill();
}

function drawBarn(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  // Body
  ctx.fillStyle = COL.barn;
  ctx.fillRect(-40, -60, 80, 60);
  // Roof
  ctx.fillStyle = COL.barnRoof;
  ctx.beginPath();
  ctx.moveTo(-50, -60);
  ctx.lineTo(0, -95);
  ctx.lineTo(50, -60);
  ctx.closePath();
  ctx.fill();
  // Door
  ctx.fillStyle = COL.barnDoor;
  roundRect(-12, -35, 24, 35, 12);
  ctx.fill();
  // X on door
  ctx.strokeStyle = '#4E342E';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-8, -30); ctx.lineTo(8, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -30); ctx.lineTo(-8, -8); ctx.stroke();
  // Window
  ctx.fillStyle = '#FFF9C4';
  ctx.beginPath(); ctx.arc(0, -70, 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = COL.barnDoor;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-8, -70); ctx.lineTo(8, -70); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -78); ctx.lineTo(0, -62); ctx.stroke();
  ctx.restore();
}

function drawTree(x, y, h, type, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Trunk
  ctx.fillStyle = COL.trunk;
  roundRect(x - 5, y - h * 0.5, 10, h * 0.5, 3);
  ctx.fill();
  if (type === 'round') {
    ctx.fillStyle = COL.tree;
    ctx.beginPath(); ctx.arc(x, y - h * 0.65, h * 0.38, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COL.treeDark;
    ctx.beginPath(); ctx.arc(x - h * 0.12, y - h * 0.72, h * 0.18, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = COL.tree;
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x + h * 0.35, y - h * 0.4);
    ctx.lineTo(x - h * 0.35, y - h * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = COL.treeDark;
    ctx.beginPath();
    ctx.moveTo(x, y - h * 0.85);
    ctx.lineTo(x + h * 0.25, y - h * 0.5);
    ctx.lineTo(x - h * 0.25, y - h * 0.5);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ── Draw Farmer ──
function drawFarmer() {
  const f = farmer;
  const x = f.x, y = f.y;
  const bounce = f.jumping ? 0 : Math.sin(f.runTimer * 0.3) * 2;
  const legPhase = state === 'playing' ? Math.sin(f.runTimer * 0.4) : 0;
  const S = 1.16; // scale factor

  ctx.save();
  ctx.translate(x, y + bounce);
  ctx.scale(S, S);

  // Shadow (drawn unscaled at ground level)
  if (f.jumping) {
    const shadowScale = 1 - (groundY - f.y) / 200;
    ctx.save();
    ctx.scale(1/S, 1/S); // undo scale for shadow position
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, (groundY - y - bounce) / 1, 22 * Math.max(0.3, shadowScale), 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ── Boots ──
  ctx.fillStyle = COL.farmerBoots;
  const leftLegX = -8 + legPhase * 5;
  const rightLegX = 8 - legPhase * 5;
  const leftLegY = legPhase > 0 ? -legPhase * 4 : 0;
  const rightLegY = legPhase < 0 ? legPhase * 4 : 0;
  roundRect(leftLegX - 6, -6 + leftLegY, 11, 8, 3);
  ctx.fill();
  roundRect(rightLegX - 5, -6 + rightLegY, 11, 8, 3);
  ctx.fill();

  // ── Overall legs ──
  ctx.fillStyle = COL.farmerOveralls;
  roundRect(leftLegX - 5, -20 + leftLegY, 9, 16, 2);
  ctx.fill();
  roundRect(rightLegX - 4, -20 + rightLegY, 9, 16, 2);
  ctx.fill();

  // ── Body — t-shirt base (visible at shoulders/sides) ──
  ctx.fillStyle = COL.farmerShirt;
  roundRect(-13, -42, 26, 24, 5);
  ctx.fill();

  // ── Overalls bib + body ──
  ctx.fillStyle = COL.farmerOveralls;
  roundRect(-11, -38, 22, 20, 4);
  ctx.fill();

  // Bib (chest area)
  ctx.fillStyle = COL.farmerOveralls;
  roundRect(-8, -40, 16, 12, 3);
  ctx.fill();

  // Name patch on bib
  ctx.fillStyle = '#7BAFD4';
  roundRect(-6, -37, 12, 7, 2);
  ctx.fill();
  // "Jen" text on patch
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 5px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Jen', 0, -33.5);

  // Overall straps
  ctx.fillStyle = COL.farmerOveralls;
  ctx.fillRect(-8, -42, 4, 8);
  ctx.fillRect(4, -42, 4, 8);

  // Buckles (small circles where straps meet bib)
  ctx.fillStyle = COL.farmerBuckle;
  ctx.beginPath(); ctx.arc(-6, -40, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -40, 1.8, 0, Math.PI * 2); ctx.fill();

  // T-shirt sleeves (visible at shoulders)
  ctx.fillStyle = COL.farmerShirt;
  roundRect(-14, -42, 6, 10, 3);
  ctx.fill();
  roundRect(8, -42, 6, 10, 3);
  ctx.fill();

  // ── Braids (behind head, drawn before head) ──
  ctx.fillStyle = COL.farmerHair;
  // Left braid
  const braidSwing = state === 'playing' ? Math.sin(f.runTimer * 0.3) * 2 : 0;
  for (let i = 0; i < 4; i++) {
    const by = -50 + i * 6;
    const bx = -11 + Math.sin(i * 1.2) * 1 - braidSwing * 0.3;
    const bw = 5 - i * 0.3;
    ctx.beginPath(); ctx.ellipse(bx, by, bw, 3.5, 0.15, 0, Math.PI * 2); ctx.fill();
  }
  // Left hair tie
  ctx.fillStyle = '#F0C040';
  ctx.beginPath(); ctx.ellipse(-11 - braidSwing * 0.3, -56, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

  // Right braid
  ctx.fillStyle = COL.farmerHair;
  for (let i = 0; i < 4; i++) {
    const by = -50 + i * 6;
    const bx = 11 + Math.sin(i * 1.2 + 1) * 1 + braidSwing * 0.3;
    const bw = 5 - i * 0.3;
    ctx.beginPath(); ctx.ellipse(bx, by, bw, 3.5, -0.15, 0, Math.PI * 2); ctx.fill();
  }
  // Right hair tie
  ctx.fillStyle = '#F0C040';
  ctx.beginPath(); ctx.ellipse(11 + braidSwing * 0.3, -56, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

  // ── Arms ──
  const armSwing = state === 'playing' ? Math.sin(f.runTimer * 0.4) * 15 : 0;
  // Left arm
  ctx.save();
  ctx.translate(-14, -37);
  ctx.rotate((-20 + armSwing) * Math.PI / 180);
  ctx.fillStyle = COL.farmerShirt;
  roundRect(-3, 0, 6, 10, 3);
  ctx.fill();
  ctx.fillStyle = COL.farmer;
  roundRect(-3, 10, 6, 6, 3);
  ctx.fill();
  ctx.beginPath(); ctx.arc(0, 18, 4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Right arm
  ctx.save();
  ctx.translate(14, -37);
  ctx.rotate((20 - armSwing) * Math.PI / 180);
  ctx.fillStyle = COL.farmerShirt;
  roundRect(-3, 0, 6, 10, 3);
  ctx.fill();
  ctx.fillStyle = COL.farmer;
  roundRect(-3, 10, 6, 6, 3);
  ctx.fill();
  ctx.beginPath(); ctx.arc(0, 18, 4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // ── Head ──
  ctx.fillStyle = COL.farmer;
  ctx.beginPath(); ctx.arc(0, -52, 13, 0, Math.PI * 2); ctx.fill();

  // ── Hair on head (center part, visible under hat) ──
  ctx.fillStyle = COL.farmerHair;
  // Center part — two curves of hair at top of head
  ctx.beginPath();
  ctx.moveTo(0, -64);
  ctx.quadraticCurveTo(-6, -63, -12, -55);
  ctx.lineTo(-12, -52);
  ctx.quadraticCurveTo(-10, -58, 0, -60);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -64);
  ctx.quadraticCurveTo(6, -63, 12, -55);
  ctx.lineTo(12, -52);
  ctx.quadraticCurveTo(10, -58, 0, -60);
  ctx.closePath();
  ctx.fill();

  // ── Front hair / bangs (peeking out under hat brim) ──
  ctx.fillStyle = '#7B4A2D';
  // Soft rounded bumps across forehead
  ctx.beginPath();
  ctx.moveTo(-10, -58);
  ctx.quadraticCurveTo(-8, -61, -5, -59);
  ctx.quadraticCurveTo(-3, -62, 0, -59.5);
  ctx.quadraticCurveTo(3, -62, 5, -59);
  ctx.quadraticCurveTo(8, -61, 10, -58);
  ctx.lineTo(10, -56);
  ctx.quadraticCurveTo(5, -57, 0, -57);
  ctx.quadraticCurveTo(-5, -57, -10, -56);
  ctx.closePath();
  ctx.fill();

  // ── Hat ──
  // Brim
  ctx.fillStyle = COL.farmerHat;
  ctx.beginPath();
  ctx.ellipse(0, -62, 20, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Brim underside shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(0, -61, 19, 4, 0, 0, Math.PI);
  ctx.fill();
  // Crown
  ctx.fillStyle = COL.farmerHat;
  roundRect(-9, -72, 18, 12, 5);
  ctx.fill();
  // Hat band
  ctx.fillStyle = COL.farmerHatBrim;
  ctx.fillRect(-9, -63, 18, 2);
  // Wheat sprig on right side
  ctx.strokeStyle = '#8B7332';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(8, -65);
  ctx.quadraticCurveTo(14, -70, 16, -72);
  ctx.stroke();
  // Leaf
  ctx.fillStyle = '#A8B84A';
  ctx.beginPath();
  ctx.moveTo(14, -70);
  ctx.quadraticCurveTo(16, -73, 18, -74);
  ctx.quadraticCurveTo(17, -71, 14, -70);
  ctx.fill();
  // Second smaller leaf
  ctx.beginPath();
  ctx.moveTo(12, -68);
  ctx.quadraticCurveTo(15, -70, 16, -71);
  ctx.quadraticCurveTo(14, -68, 12, -68);
  ctx.fill();

  // ── Face ──
  // Eyes — dark brown friendly dots
  ctx.fillStyle = '#3E2210';
  ctx.beginPath(); ctx.arc(-4, -54, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -54, 2, 0, Math.PI * 2); ctx.fill();
  // Tiny eye highlights
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(-3.2, -55, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.8, -55, 0.8, 0, Math.PI * 2); ctx.fill();

  // Tiny nose
  ctx.fillStyle = 'rgba(180,130,100,0.4)';
  ctx.beginPath(); ctx.arc(0, -51, 1.2, 0, Math.PI * 2); ctx.fill();

  // Smile — gentle upward curve
  ctx.strokeStyle = '#7D5A3C';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(0, -48, 4, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  // Rosy blush circles
  ctx.fillStyle = COL.farmerBlush;
  ctx.beginPath(); ctx.arc(-8, -49, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -49, 3.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ── Draw Obstacles ──
function drawObstacle(obs) {
  ctx.save();
  ctx.translate(obs.x + obs.w / 2, obs.y + obs.h);
  switch (obs.type) {
    case 'rock':
      ctx.fillStyle = '#9E9E9E';
      ctx.beginPath();
      ctx.moveTo(-obs.w/2, 0);
      ctx.quadraticCurveTo(-obs.w/2, -obs.h, -obs.w/4, -obs.h);
      ctx.quadraticCurveTo(0, -obs.h - 6, obs.w/4, -obs.h);
      ctx.quadraticCurveTo(obs.w/2, -obs.h, obs.w/2, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#BDBDBD';
      ctx.beginPath(); ctx.arc(-4, -obs.h * 0.6, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#757575';
      ctx.beginPath(); ctx.arc(6, -obs.h * 0.4, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'hay':
      ctx.fillStyle = '#FFD54F';
      roundRect(-obs.w/2, -obs.h, obs.w, obs.h, 6);
      ctx.fill();
      ctx.strokeStyle = '#FFC107';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-obs.w/2, -obs.h + (i + 1) * obs.h / 4);
        ctx.lineTo(obs.w/2, -obs.h + (i + 1) * obs.h / 4);
        ctx.stroke();
      }
      // Red ribbon
      ctx.fillStyle = '#E53935';
      ctx.fillRect(-obs.w/2 + 2, -obs.h * 0.6, obs.w - 4, 4);
      break;
    case 'crate':
      ctx.fillStyle = '#8D6E63';
      roundRect(-obs.w/2, -obs.h, obs.w, obs.h, 3);
      ctx.fill();
      ctx.strokeStyle = '#5D4037';
      ctx.lineWidth = 2;
      ctx.strokeRect(-obs.w/2 + 2, -obs.h + 2, obs.w - 4, obs.h - 4);
      ctx.beginPath();
      ctx.moveTo(-obs.w/2 + 2, -obs.h + 2);
      ctx.lineTo(obs.w/2 - 2, -2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(obs.w/2 - 2, -obs.h + 2);
      ctx.lineTo(-obs.w/2 + 2, -2);
      ctx.stroke();
      break;
    case 'bush':
      ctx.fillStyle = '#66BB6A';
      ctx.beginPath();
      ctx.arc(-8, -obs.h * 0.5, obs.h * 0.55, 0, Math.PI * 2);
      ctx.arc(8, -obs.h * 0.5, obs.h * 0.55, 0, Math.PI * 2);
      ctx.arc(0, -obs.h * 0.7, obs.h * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#43A047';
      ctx.beginPath();
      ctx.arc(-4, -obs.h * 0.6, obs.h * 0.25, 0, Math.PI * 2);
      ctx.fill();
      // Small flowers
      ctx.fillStyle = '#FFF176';
      ctx.beginPath(); ctx.arc(-10, -obs.h * 0.7, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#EF9A9A';
      ctx.beginPath(); ctx.arc(6, -obs.h * 0.8, 2, 0, Math.PI * 2); ctx.fill();
      break;
    case 'pumpkinObs':
      ctx.fillStyle = '#FF6F00';
      ctx.beginPath(); ctx.ellipse(0, -obs.h/2, obs.w/2, obs.h/2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#E65100';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, -obs.h); ctx.lineTo(0, 0); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0, -obs.h/2, obs.w/4, obs.h/2, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      ctx.moveTo(0, -obs.h);
      ctx.quadraticCurveTo(8, -obs.h - 10, 12, -obs.h - 4);
      ctx.quadraticCurveTo(6, -obs.h - 2, 0, -obs.h);
      ctx.fill();
      break;
  }
  ctx.restore();
}

// ── Draw ingredient silhouette (solid color for outline effect) ──
function drawIngredientSilhouette(name, s, col) {
  ctx.fillStyle = col;
  switch (name) {
    case 'Apple':
      ctx.beginPath(); ctx.arc(0, 2, s - 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-1, -s + 1, 2, 6);
      break;
    case 'Carrot':
      ctx.beginPath();
      ctx.moveTo(0, s); ctx.lineTo(-8, -4); ctx.quadraticCurveTo(0, -8, 8, -4);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-3, -5); ctx.quadraticCurveTo(-8, -s, -2, -s + 2); ctx.lineTo(0, -5); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(3, -5); ctx.quadraticCurveTo(8, -s, 2, -s + 2); ctx.lineTo(0, -5); ctx.fill();
      break;
    case 'Beetroot':
      ctx.beginPath(); ctx.arc(0, 2, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0, s - 2); ctx.lineTo(-2, s + 4); ctx.lineTo(2, s + 4); ctx.closePath(); ctx.fill();
      ctx.fillRect(-1, -s + 1, 2, 5);
      break;
    case 'Flax':
      ctx.fillRect(-1, -s + 2, 2, s * 2 - 4);
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath(); ctx.arc(Math.cos(angle) * 5, -s + 5 + Math.sin(angle) * 5, 3.5, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'Strawberry':
      ctx.beginPath();
      ctx.moveTo(0, s - 1);
      ctx.quadraticCurveTo(-s + 1, s - 6, -s + 3, -2);
      ctx.quadraticCurveTo(-s + 5, -s + 3, 0, -s + 4);
      ctx.quadraticCurveTo(s - 5, -s + 3, s - 3, -2);
      ctx.quadraticCurveTo(s - 1, s - 6, 0, s - 1);
      ctx.fill();
      break;
    case 'Coconut':
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Squash':
      ctx.beginPath(); ctx.ellipse(0, 2, s - 4, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-2, -s + 2, 4, 5);
      break;
    case 'Pear':
      ctx.beginPath();
      ctx.moveTo(0, -s + 5);
      ctx.quadraticCurveTo(-6, -s + 8, -s + 3, 3);
      ctx.quadraticCurveTo(-s + 3, s, 0, s - 1);
      ctx.quadraticCurveTo(s - 3, s, s - 3, 3);
      ctx.quadraticCurveTo(6, -s + 8, 0, -s + 5);
      ctx.fill();
      ctx.fillRect(-1, -s + 2, 2, 5);
      break;
    case 'Blueberry':
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Spinach':
      ctx.beginPath(); ctx.ellipse(0, 0, s - 5, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-5, -5, 5, 7, -0.4, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Pumpkin':
      ctx.beginPath(); ctx.ellipse(0, 2, s - 2, s - 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-2, -s + 3, 4, 5);
      break;
    case 'Pineapple':
      roundRect(-s + 4, -s + 6, (s - 4) * 2, (s - 2) * 1.6, 4); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -s + 6); ctx.lineTo(-5, -s); ctx.lineTo(0, -s + 3);
      ctx.lineTo(5, -s); ctx.lineTo(0, -s + 6); ctx.fill();
      break;
    case 'Banana':
      ctx.beginPath();
      ctx.moveTo(-s + 3, 0);
      ctx.quadraticCurveTo(-s + 3, -s + 2, 0, -s + 4);
      ctx.quadraticCurveTo(s - 3, -s + 2, s - 1, 2);
      ctx.quadraticCurveTo(s - 4, 4, s - 6, 2);
      ctx.quadraticCurveTo(s - 6, -s + 6, 0, -s + 8);
      ctx.quadraticCurveTo(-s + 6, -s + 6, -s + 5, 0);
      ctx.closePath(); ctx.fill();
      break;
    case 'Dragonfruit':
      ctx.beginPath(); ctx.ellipse(0, 0, s - 3, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Mango':
      ctx.beginPath(); ctx.ellipse(0, 0, s - 2, s - 4, 0.3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Orange':
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Guava':
      ctx.beginPath(); ctx.ellipse(0, 0, s - 3, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-1, -s + 2, 2, 4);
      break;
  }
}

// ── Outline colors per ingredient (darker same-hue) ──
const INGR_OUTLINE = {
  Apple: '#C42020', Carrot: '#CC5500', Beetroot: '#8B1A4A',
  Flax: '#5C3D08', Strawberry: '#C42020', Coconut: '#8B6914',
  Squash: '#CC6600', Pear: '#8B9E00', Blueberry: '#2D1F6E',
  Spinach: '#2D6B2D', Pumpkin: '#CC5500', Pineapple: '#CC9900',
  Banana: '#CC9900', Dragonfruit: '#B01050', Mango: '#CC6600',
  Orange: '#CC5500', Guava: '#C07070'
};

// ── Draw Ingredients ──
function drawIngredient(ingr) {
  const x = ingr.x, y = ingr.y + Math.sin(ingr.bobTimer) * 6;
  const s = 14; // half-size
  const c = INGR_COLORS[ingr.name];
  if (!c) return;
  const outlineCol = INGR_OUTLINE[ingr.name] || '#666';

  ctx.save();
  ctx.translate(x, y);

  // Soft colored glow using ingredient's own color
  const glowR = s + 16;
  const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
  const gc = c.fill;
  // Parse hex to rgba for gradient stops
  const hr = parseInt(gc.slice(1,3),16), hg = parseInt(gc.slice(3,5),16), hb = parseInt(gc.slice(5,7),16);
  glowGrad.addColorStop(0, `rgba(${hr},${hg},${hb},0.25)`);
  glowGrad.addColorStop(1, `rgba(${hr},${hg},${hb},0)`);
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI * 2); ctx.fill();

  // Draw outline pass — slightly larger, in darker hue
  ctx.save();
  ctx.scale(1.12, 1.12);
  ctx.globalAlpha = 0.6;
  ctx.globalCompositeOperation = 'source-over';
  drawIngredientSilhouette(ingr.name, s, outlineCol);
  ctx.restore();

  switch (ingr.name) {
    case 'Apple':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 2, s - 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-4, -2, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-1, -s + 1, 2, 6);
      ctx.beginPath();
      ctx.moveTo(1, -s + 3);
      ctx.quadraticCurveTo(7, -s - 1, 8, -s + 5);
      ctx.quadraticCurveTo(5, -s + 3, 1, -s + 3);
      ctx.fillStyle = c.stem;
      ctx.fill();
      break;
    case 'Carrot':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.lineTo(-8, -4);
      ctx.quadraticCurveTo(0, -8, 8, -4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.moveTo(-3, -5); ctx.quadraticCurveTo(-8, -s, -2, -s + 2); ctx.lineTo(0, -5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(3, -5); ctx.quadraticCurveTo(8, -s, 2, -s + 2); ctx.lineTo(0, -5);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-3, 5); ctx.lineTo(3, 5); ctx.stroke();
      break;
    case 'Beetroot':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 2, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, s - 2);
      ctx.lineTo(-2, s + 4);
      ctx.lineTo(2, s + 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(-1, -s + 1, 2, 5);
      ctx.beginPath();
      ctx.moveTo(0, -s + 3);
      ctx.quadraticCurveTo(-6, -s - 3, -3, -s + 1);
      ctx.fill();
      break;
    case 'Flax':
      ctx.fillStyle = c.stem;
      ctx.fillRect(-1, -s + 2, 2, s * 2 - 4);
      ctx.fillStyle = c.fill;
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * 5, -s + 5 + Math.sin(angle) * 5, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'Strawberry':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(0, s - 1);
      ctx.quadraticCurveTo(-s + 1, s - 6, -s + 3, -2);
      ctx.quadraticCurveTo(-s + 5, -s + 3, 0, -s + 4);
      ctx.quadraticCurveTo(s - 5, -s + 3, s - 3, -2);
      ctx.quadraticCurveTo(s - 1, s - 6, 0, s - 1);
      ctx.fill();
      ctx.fillStyle = c.seed;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(-4 + (i % 3) * 4, -2 + Math.floor(i / 3) * 6, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.moveTo(0, -s + 4);
      ctx.lineTo(-6, -s + 1); ctx.lineTo(-3, -s + 5);
      ctx.lineTo(0, -s + 2);
      ctx.lineTo(3, -s + 5); ctx.lineTo(6, -s + 1);
      ctx.closePath();
      ctx.fill();
      break;
    case 'Coconut':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(3, -3, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.eye1;
      ctx.beginPath(); ctx.arc(-4, -2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, 4, 1.5, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Squash':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 2, s - 4, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.ellipse(-3, -1, 4, 6, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-2, -s + 2, 4, 5);
      break;
    case 'Pear':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(0, -s + 5);
      ctx.quadraticCurveTo(-6, -s + 8, -s + 3, 3);
      ctx.quadraticCurveTo(-s + 3, s, 0, s - 1);
      ctx.quadraticCurveTo(s - 3, s, s - 3, 3);
      ctx.quadraticCurveTo(6, -s + 8, 0, -s + 5);
      ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, 2, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-1, -s + 2, 2, 5);
      break;
    case 'Blueberry':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -3, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.crown;
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI - Math.PI;
        ctx.beginPath(); ctx.arc(Math.cos(a) * 4, -s + 5 + Math.sin(a) * 2, 2, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'Spinach':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.ellipse(0, 0, s - 5, s - 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = c.vein;
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, -s + 3); ctx.lineTo(0, s - 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-6, -6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(6, 5); ctx.stroke();
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.ellipse(-5, -5, 5, 7, -0.4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'Pumpkin':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 2, s - 2, s - 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = c.line;
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(0, 2, s/3, s - 4, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-2, -s + 3, 4, 5);
      break;
    case 'Pineapple':
      ctx.fillStyle = c.fill;
      roundRect(-s + 4, -s + 6, (s - 4) * 2, (s - 2) * 1.6, 4);
      ctx.fill();
      ctx.strokeStyle = c.pattern;
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-s + 5, -s + 10 + i * 6);
        ctx.lineTo(s - 5, -s + 10 + i * 6);
        ctx.stroke();
      }
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.moveTo(0, -s + 6);
      ctx.lineTo(-5, -s); ctx.lineTo(0, -s + 3);
      ctx.lineTo(5, -s); ctx.lineTo(0, -s + 6);
      ctx.fill();
      break;
    case 'Banana':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(-s + 3, 0);
      ctx.quadraticCurveTo(-s + 3, -s + 2, 0, -s + 4);
      ctx.quadraticCurveTo(s - 3, -s + 2, s - 1, 2);
      ctx.quadraticCurveTo(s - 4, 4, s - 6, 2);
      ctx.quadraticCurveTo(s - 6, -s + 6, 0, -s + 8);
      ctx.quadraticCurveTo(-s + 6, -s + 6, -s + 5, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.beginPath(); ctx.arc(s - 2, 3, 2, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Dragonfruit':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 0, s - 3, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.scale;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 - Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (s - 5), Math.sin(a) * (s - 5));
        ctx.lineTo(Math.cos(a) * (s + 2), Math.sin(a) * (s + 2));
        ctx.lineTo(Math.cos(a + 0.3) * (s - 3), Math.sin(a + 0.3) * (s - 3));
        ctx.fill();
      }
      ctx.fillStyle = c.flesh;
      ctx.beginPath(); ctx.arc(0, 0, s - 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.seed;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.arc(-3 + (i % 2) * 6, -2 + Math.floor(i / 2) * 5, 1, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'Mango':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.ellipse(0, 0, s - 2, s - 4, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = c.blush;
      ctx.globalAlpha = 0.35;
      ctx.beginPath(); ctx.arc(-4, -3, 6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(3, -4, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Orange':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -3, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.nub;
      ctx.beginPath(); ctx.arc(0, -s + 4, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Guava':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 0, s - 3, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.blush;
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(0, 2, 6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#689F38';
      ctx.fillRect(-1, -s + 2, 2, 4);
      break;
  }
  ctx.restore();
}

// ── Sparkles ──
function addSparkle(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    sparkles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 2),
      vy: Math.sin(angle) * (2 + Math.random() * 2),
      life: 1,
      size: 2 + Math.random() * 3,
      color: COL.confetti[Math.floor(Math.random() * COL.confetti.length)],
    });
  }
}

function updateSparkles() {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.05;
    s.life -= 0.03;
    if (s.life <= 0) sparkles.splice(i, 1);
  }
}

function drawSparkles() {
  sparkles.forEach(s => {
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    // Star shape
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + gameTime * 3;
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + Math.cos(a) * s.size, s.y + Math.sin(a) * s.size);
      ctx.lineTo(s.x + Math.cos(a + 0.3) * s.size * 0.4, s.y + Math.sin(a + 0.3) * s.size * 0.4);
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ── Confetti ──
function addConfetti() {
  for (let i = 0; i < 80; i++) {
    confettiParts.push({
      x: Math.random() * W(),
      y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 3,
      vy: 1.5 + Math.random() * 3,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      w: 6 + Math.random() * 6,
      h: 4 + Math.random() * 4,
      color: COL.confetti[Math.floor(Math.random() * COL.confetti.length)],
      life: 1,
    });
  }
}

function updateConfetti() {
  for (let i = confettiParts.length - 1; i >= 0; i--) {
    const c = confettiParts[i];
    c.x += c.vx;
    c.y += c.vy;
    c.rotation += c.rotSpeed;
    c.vx += (Math.random() - 0.5) * 0.1;
    if (c.y > H() + 20) {
      c.life -= 0.02;
      if (c.life <= 0) confettiParts.splice(i, 1);
    }
  }
}

function drawConfetti() {
  confettiParts.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.globalAlpha = c.life;
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  });
}

// ── Pouch Drawing ──
function drawPouch(x, y, size, color, completed, current, outlineColor) {
  ctx.save();
  ctx.translate(x, y);
  const s = size;

  // Pouch body
  ctx.fillStyle = completed ? color : (current ? color : '#BDBDBD');
  ctx.globalAlpha = completed ? 1 : (current ? 0.85 : 0.35);

  // Pulse for current
  let scale = 1;
  if (current && !completed) {
    scale = 1 + Math.sin(gameTime * 3) * 0.05;
  }
  ctx.scale(scale, scale);

  // Pouch shape path helper
  function pouchPath() {
    ctx.beginPath();
    ctx.moveTo(-s * 0.35, -s * 0.5);
    ctx.lineTo(-s * 0.4, s * 0.25);
    ctx.quadraticCurveTo(-s * 0.4, s * 0.5, 0, s * 0.5);
    ctx.quadraticCurveTo(s * 0.4, s * 0.5, s * 0.4, s * 0.25);
    ctx.lineTo(s * 0.35, -s * 0.5);
    ctx.closePath();
  }

  // Outline stroke
  if (outlineColor) {
    const isLocked = !completed && !current;
    ctx.save();
    if (isLocked) {
      ctx.strokeStyle = '#AAAAAA';
      ctx.globalAlpha = 0.5 * 0.35;
    } else {
      ctx.strokeStyle = outlineColor;
    }
    ctx.lineWidth = 2;
    pouchPath();
    ctx.stroke();
    // Cap outline
    roundRect(-s * 0.38, -s * 0.6, s * 0.76, s * 0.15, 3);
    ctx.stroke();
    ctx.restore();
  }

  // Pouch body fill
  ctx.fillStyle = completed ? color : (current ? color : '#BDBDBD');
  pouchPath();
  ctx.fill();

  // Cap
  ctx.fillStyle = completed ? '#4CAF50' : (current ? '#81C784' : '#9E9E9E');
  roundRect(-s * 0.38, -s * 0.6, s * 0.76, s * 0.15, 3);
  ctx.fill();

  ctx.globalAlpha = 1;

  // Checkmark for completed
  if (completed) {
    ctx.fillStyle = COL.check;
    ctx.beginPath();
    ctx.arc(s * 0.28, s * 0.32, s * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s * 0.2, s * 0.32);
    ctx.lineTo(s * 0.26, s * 0.38);
    ctx.lineTo(s * 0.36, s * 0.26);
    ctx.stroke();
  }

  ctx.restore();
}

// ── HUD ──
function drawHUD() {
  if (state !== 'playing') return;
  const w = W(), h = H();
  const cel = pouchCelebration;

  // ─── Celebration: Full-screen color wash (Step 1) ───
  if (cel && cel.frame < 20) {
    const washAlpha = Math.sin((cel.frame / 20) * Math.PI) * 0.2;
    ctx.fillStyle = cel.pouchColor;
    ctx.globalAlpha = washAlpha;
    ctx.fillRect(0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // ─── HUD — Win Screen Style ───
  const hudLabelColor = '#555555';
  const hudMutedColor = '#AAAAAA';

  // Pouch/ingredient display indices
  const displayPouch = (cel && cel.frame >= 60) ? cel.nextIndex : currentPouch;
  const activePouchIdx = Math.min(displayPouch, 4);
  const activePouch = POUCHES[activePouchIdx];
  const pouchNameText = activePouch.name.replace('\n', ' ');

  // ═══ TOP PANEL — Current pouch + ingredients ═══
  const topPouchSize = 28;
  const topIngrSize = 36;
  const topIngrGap = 14;
  const topIconsW = topPouchSize + 10 + 1 + 10 + 4 * topIngrSize + 3 * topIngrGap;
  const topLabelFont = `600 13px ${FONT}`;
  const topNameFont = `800 13px ${FONT}`;

  // Measure panel width
  ctx.font = topLabelFont;
  const prefixText = 'Collecting for: ';
  const prefixW = ctx.measureText(prefixText).width;
  ctx.font = topNameFont;
  const nameW = ctx.measureText(pouchNameText).width;
  const topLabelW = prefixW + nameW;
  const topContentW = Math.max(topLabelW, topIconsW);
  const topPadX = 24, topPadY = 12;
  const topPanelW = Math.min(topContentW + topPadX * 2, w * 0.7);
  const topPanelH = 110;
  const topPanelX = (w - topPanelW) / 2;
  const topPanelY = 16;

  // Draw top panel card
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.10)';
  ctx.shadowBlur = 16;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.roundRect(topPanelX, topPanelY, topPanelW, topPanelH, 20);
  ctx.fill();
  ctx.restore();

  // Label row — centered
  const topLabelY = topPanelY + topPadY + 8;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';

  if (cel && cel.frame < 60) {
    const celebText = cel.pouchName + ' complete!';
    const t = cel.frame / 60;
    let textScale = 1, textAlpha = 1;
    if (t < 0.15) textScale = 0.5 + t / 0.15 * 0.5;
    if (t > 0.75) textAlpha = 1 - (t - 0.75) / 0.25;
    ctx.save();
    ctx.translate(w / 2, topLabelY);
    ctx.scale(textScale, textScale);
    ctx.globalAlpha = textAlpha;
    ctx.fillStyle = POUCHES[cel.completedIndex].color;
    ctx.font = `800 15px ${FONT}`;
    ctx.fillText(celebText, 0, 0);
    ctx.restore();
  } else if (cel && cel.frame >= 60 && cel.frame < 90) {
    const t = (cel.frame - 60) / 30;
    const newName = POUCHES[Math.min(cel.nextIndex, 4)].name.replace('\n', ' ');
    const newColor = POUCHES[Math.min(cel.nextIndex, 4)].color;
    ctx.save();
    ctx.globalAlpha = t;
    ctx.font = topLabelFont;
    ctx.fillStyle = hudLabelColor;
    const fullPrefix = prefixText;
    const halfLabelW2 = (ctx.measureText(fullPrefix).width + (() => { ctx.font = topNameFont; return ctx.measureText(newName).width; })()) / 2;
    const labelStartX = w / 2 - halfLabelW2;
    ctx.textAlign = 'left';
    ctx.font = topLabelFont;
    ctx.fillText(fullPrefix, labelStartX, topLabelY);
    ctx.font = topNameFont;
    ctx.fillStyle = newColor;
    ctx.fillText(newName, labelStartX + prefixW, topLabelY);
    ctx.restore();
  } else {
    ctx.font = topLabelFont;
    const measuredPrefixW = ctx.measureText(prefixText).width;
    ctx.font = topNameFont;
    const measuredNameW = ctx.measureText(pouchNameText).width;
    const halfLabelW = (measuredPrefixW + measuredNameW) / 2;
    const labelStartX = w / 2 - halfLabelW;
    ctx.textAlign = 'left';
    ctx.font = topLabelFont;
    ctx.fillStyle = hudLabelColor;
    ctx.fillText(prefixText, labelStartX, topLabelY);
    ctx.font = topNameFont;
    ctx.fillStyle = activePouch.color;
    ctx.fillText(pouchNameText, labelStartX + measuredPrefixW, topLabelY);
  }

  // Icon row — centered, with clear gap below label
  const topIconRowY = topLabelY + 36;
  const topIconsStartX = w / 2 - topIconsW / 2;
  let icx = topIconsStartX;

  // Pouch icon
  let pouchScale = 1;
  let pouchColor = activePouch.color;
  if (cel && cel.frame < 60) {
    const t = cel.frame / 60;
    pouchScale = 1 + 0.4 * Math.sin(t * Math.PI) * Math.max(0, 1 - t * 0.5);
    pouchColor = POUCHES[cel.completedIndex].color;
  } else if (cel && cel.frame >= 60 && cel.frame < 90) {
    pouchColor = activePouch.color;
    pouchScale = 1;
  }
  ctx.save();
  const pouchCenterY = topIconRowY + (topIngrSize - topPouchSize) / 4;
  ctx.translate(icx + topPouchSize / 2, pouchCenterY);
  ctx.scale(pouchScale, pouchScale);
  const leftPouchOutline = (cel && cel.frame < 60) ? POUCHES[cel.completedIndex].outline : activePouch.outline;
  drawPouch(0, 0, topPouchSize, pouchColor, false, true, leftPouchOutline);
  ctx.restore();

  // FIX 3 — Separator between pouch and ingredients
  icx += topPouchSize + 10;
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  const divH = topIngrSize * 0.7;
  ctx.beginPath();
  ctx.moveTo(icx, topIconRowY - divH / 2);
  ctx.lineTo(icx, topIconRowY + divH / 2);
  ctx.stroke();
  icx += 10;

  // Ingredient icons
  const slotsPouch = (cel && cel.frame >= 60) ? Math.min(cel.nextIndex, 4) : activePouchIdx;
  const slotsData = POUCHES[slotsPouch];
  const slotsCollected = collectedIngredients[slotsPouch] || [];

  slotsData.ingredients.forEach((ingr, i) => {
    const ix = icx + i * (topIngrSize + topIngrGap) + topIngrSize / 2;
    const iy = topIconRowY;

    let isCollected;
    let slotAlpha = 1;

    if (cel && cel.frame < 60) {
      isCollected = true;
    } else if (cel && cel.frame >= 60 && cel.frame < 90) {
      isCollected = false;
      const staggerDelay = i * 6;
      const slotT = Math.max(0, (cel.frame - 60 - staggerDelay)) / (30 - staggerDelay);
      slotAlpha = Math.min(1, slotT * 2);
    } else {
      isCollected = slotsCollected.includes(ingr);
    }

    ctx.save();
    ctx.translate(ix, iy);
    const aScale = topIngrSize / 28;
    ctx.scale(aScale, aScale);
    if (isCollected) {
      ctx.globalAlpha = slotAlpha;
    } else {
      ctx.globalAlpha = 0.50 * slotAlpha;
      ctx.filter = 'saturate(0.35)';
    }
    drawIngredientArt(ingr, 14);
    ctx.restore();

    if (isCollected) {
      ctx.save();
      ctx.globalAlpha = slotAlpha;
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(ix - 5, iy + 1);
      ctx.lineTo(ix - 1, iy + 6);
      ctx.lineTo(ix + 6, iy - 4);
      ctx.stroke();
      ctx.restore();
    }

    // Ingredient name label below icon
    const ingrColor = INGR_COLORS[ingr] ? INGR_COLORS[ingr].fill : '#9E9E9E';
    ctx.save();
    ctx.globalAlpha = isCollected ? slotAlpha : 0.50 * slotAlpha;
    ctx.fillStyle = isCollected ? ingrColor : hudMutedColor;
    ctx.font = `600 11px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(ingr, ix, iy + topIngrSize / 2 + 8);
    ctx.restore();
  });

  // ═══ BOTTOM PANEL — Pouches filled ═══
  const btmPouchSize = 28;
  const btmPouchGap = 10;
  const btmPouchesW = 5 * btmPouchSize + 4 * btmPouchGap;
  const filledCount = completedPouches.filter(Boolean).length;
  const btmLabelText = 'Pouches filled: ' + filledCount + '/5';
  ctx.font = `600 12px ${FONT}`;
  const btmLabelW = ctx.measureText(btmLabelText).width;
  const btmContentW = Math.max(btmLabelW, btmPouchesW);
  const btmPadX = 20, btmPadY = 10;
  const btmPanelW = btmContentW + btmPadX * 2;
  const btmPanelH = 66;
  const btmPanelX = (w - btmPanelW) / 2;
  const btmPanelY = h - 16 - btmPanelH;

  // Draw bottom panel card
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.10)';
  ctx.shadowBlur = 16;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.roundRect(btmPanelX, btmPanelY, btmPanelW, btmPanelH, 20);
  ctx.fill();
  ctx.restore();

  // Label
  const btmLabelY = btmPanelY + btmPadY + 8;
  ctx.font = `600 12px ${FONT}`;
  ctx.fillStyle = hudLabelColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(btmLabelText, w / 2, btmLabelY);

  // Pouch icons — centered, below label
  const btmIconRowY = btmLabelY + 24;
  const btmIconsStartX = w / 2 - btmPouchesW / 2;
  for (let i = 0; i < 5; i++) {
    const px = btmIconsStartX + i * (btmPouchSize + btmPouchGap) + btmPouchSize / 2;
    drawPouch(px, btmIconRowY, btmPouchSize, POUCHES[i].color, completedPouches[i], i === currentPouch, POUCHES[i].outline);
  }

  ctx.textBaseline = 'alphabetic';

  // ─── Update celebration timer ───
  if (cel) {
    cel.frame++;
    if (cel.frame >= cel.totalFrames) {
      pouchCelebration = null;
    }
  }
}

function drawIngredientIcon(name, x, y, s) {
  // Simplified mini version
  const c = INGR_COLORS[name];
  if (!c) return;
  ctx.fillStyle = c.fill;
  ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI * 2); ctx.fill();
  if (c.highlight) {
    ctx.fillStyle = c.highlight;
    ctx.beginPath(); ctx.arc(x - s * 0.25, y - s * 0.25, s * 0.35, 0, Math.PI * 2); ctx.fill();
  }
}

// ── Draw ingredient art at origin (same art as game world) ──
function drawIngredientArt(name, s) {
  const c = INGR_COLORS[name];
  if (!c) return;
  switch (name) {
    case 'Apple':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 2, s - 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-4, -2, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-1, -s + 1, 2, 6);
      ctx.beginPath();
      ctx.moveTo(1, -s + 3);
      ctx.quadraticCurveTo(7, -s - 1, 8, -s + 5);
      ctx.quadraticCurveTo(5, -s + 3, 1, -s + 3);
      ctx.fillStyle = c.stem;
      ctx.fill();
      break;
    case 'Carrot':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.lineTo(-8, -4);
      ctx.quadraticCurveTo(0, -8, 8, -4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.moveTo(-3, -5); ctx.quadraticCurveTo(-8, -s, -2, -s + 2); ctx.lineTo(0, -5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(3, -5); ctx.quadraticCurveTo(8, -s, 2, -s + 2); ctx.lineTo(0, -5);
      ctx.fill();
      break;
    case 'Beetroot':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 2, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, s - 2); ctx.lineTo(-2, s + 4); ctx.lineTo(2, s + 4);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(-1, -s + 1, 2, 5);
      ctx.beginPath();
      ctx.moveTo(0, -s + 3);
      ctx.quadraticCurveTo(-6, -s - 3, -3, -s + 1);
      ctx.fill();
      break;
    case 'Flax':
      ctx.fillStyle = c.stem;
      ctx.fillRect(-1, -s + 2, 2, s * 2 - 4);
      ctx.fillStyle = c.fill;
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * 5, -s + 5 + Math.sin(angle) * 5, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'Strawberry':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(0, s - 1);
      ctx.quadraticCurveTo(-s + 1, s - 6, -s + 3, -2);
      ctx.quadraticCurveTo(-s + 5, -s + 3, 0, -s + 4);
      ctx.quadraticCurveTo(s - 5, -s + 3, s - 3, -2);
      ctx.quadraticCurveTo(s - 1, s - 6, 0, s - 1);
      ctx.fill();
      ctx.fillStyle = c.seed;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(-4 + (i % 3) * 4, -2 + Math.floor(i / 3) * 6, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.moveTo(0, -s + 4);
      ctx.lineTo(-6, -s + 1); ctx.lineTo(-3, -s + 5);
      ctx.lineTo(0, -s + 2);
      ctx.lineTo(3, -s + 5); ctx.lineTo(6, -s + 1);
      ctx.closePath(); ctx.fill();
      break;
    case 'Coconut':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(3, -3, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.eye1;
      ctx.beginPath(); ctx.arc(-4, -2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, 4, 1.5, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Squash':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 2, s - 4, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.ellipse(-3, -1, 4, 6, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-2, -s + 2, 4, 5);
      break;
    case 'Pear':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(0, -s + 5);
      ctx.quadraticCurveTo(-6, -s + 8, -s + 3, 3);
      ctx.quadraticCurveTo(-s + 3, s, 0, s - 1);
      ctx.quadraticCurveTo(s - 3, s, s - 3, 3);
      ctx.quadraticCurveTo(6, -s + 8, 0, -s + 5);
      ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, 2, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-1, -s + 2, 2, 5);
      break;
    case 'Blueberry':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -3, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.crown;
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI - Math.PI;
        ctx.beginPath(); ctx.arc(Math.cos(a) * 4, -s + 5 + Math.sin(a) * 2, 2, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'Spinach':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 0, s - 5, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = c.vein; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, -s + 3); ctx.lineTo(0, s - 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-6, -6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(6, 5); ctx.stroke();
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(-5, -5, 5, 7, -0.4, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Pumpkin':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 2, s - 2, s - 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = c.line; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(0, 2, s / 3, s - 4, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = c.stem;
      ctx.fillRect(-2, -s + 3, 4, 5);
      break;
    case 'Pineapple':
      roundRect(-s + 4, -s + 6, (s - 4) * 2, (s - 2) * 1.6, 4);
      ctx.fillStyle = c.fill; ctx.fill();
      ctx.strokeStyle = c.pattern; ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-s + 5, -s + 10 + i * 6);
        ctx.lineTo(s - 5, -s + 10 + i * 6);
        ctx.stroke();
      }
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.moveTo(0, -s + 6);
      ctx.lineTo(-5, -s); ctx.lineTo(0, -s + 3);
      ctx.lineTo(5, -s); ctx.lineTo(0, -s + 6);
      ctx.fill();
      break;
    case 'Banana':
      ctx.fillStyle = c.fill;
      ctx.beginPath();
      ctx.moveTo(-s + 3, 0);
      ctx.quadraticCurveTo(-s + 3, -s + 2, 0, -s + 4);
      ctx.quadraticCurveTo(s - 3, -s + 2, s - 1, 2);
      ctx.quadraticCurveTo(s - 4, 4, s - 6, 2);
      ctx.quadraticCurveTo(s - 6, -s + 6, 0, -s + 8);
      ctx.quadraticCurveTo(-s + 6, -s + 6, -s + 5, 0);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = c.stem;
      ctx.beginPath(); ctx.arc(s - 2, 3, 2, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Dragonfruit':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 0, s - 3, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.scale;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 - Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (s - 5), Math.sin(a) * (s - 5));
        ctx.lineTo(Math.cos(a) * (s + 2), Math.sin(a) * (s + 2));
        ctx.lineTo(Math.cos(a + 0.3) * (s - 3), Math.sin(a + 0.3) * (s - 3));
        ctx.fill();
      }
      ctx.fillStyle = c.flesh;
      ctx.beginPath(); ctx.arc(0, 0, s - 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.seed;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.arc(-3 + (i % 2) * 6, -2 + Math.floor(i / 2) * 5, 1, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'Mango':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 0, s - 2, s - 4, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.blush;
      ctx.globalAlpha *= 0.35;
      ctx.beginPath(); ctx.arc(-4, -3, 6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha /= 0.35;
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(3, -4, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Orange':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.arc(0, 0, s - 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -3, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.nub;
      ctx.beginPath(); ctx.arc(0, -s + 4, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'Guava':
      ctx.fillStyle = c.fill;
      ctx.beginPath(); ctx.ellipse(0, 0, s - 3, s - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.blush;
      ctx.globalAlpha *= 0.3;
      ctx.beginPath(); ctx.arc(0, 2, 6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha /= 0.3;
      ctx.fillStyle = c.highlight;
      ctx.beginPath(); ctx.arc(-3, -3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#689F38';
      ctx.fillRect(-1, -s + 2, 2, 4);
      break;
  }
}

// ── Start Screen ──
let signHover = false;
canvas.addEventListener('mousemove', function(e) {
  if (state !== 'start' || !startBtn) return;
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
  signHover = sx >= startBtn.x && sx <= startBtn.x + startBtn.w &&
              sy >= startBtn.y && sy <= startBtn.y + startBtn.h;
  canvas.style.cursor = signHover ? 'pointer' : 'default';
});

function drawStartScreen() {
  drawBackground();
  // Farmer idle — position next to CTA button
  const savedFarmerX = farmer.x;
  farmer.x = W() / 2 - 140 - 30; // just left of the pill button
  farmer.y = groundY;
  farmer.idleTimer += 0.02;
  drawFarmer();
  farmer.x = savedFarmerX;

  const w = W(), h = H();

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, w, h);

  // ── TOP LINE — supporting instruction ──
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const topFontSize = 18;
  const topFont = `600 ${topFontSize}px ${FONT}`;
  const topColor = 'rgba(255,255,255,0.85)';
  const topY1 = h * 0.15;

  // Line 1 with SPACE pill inline
  const line1Parts = [
    { text: 'Jump ', style: 'normal' },
    { text: ' SPACE ', style: 'key' },
    { text: ' to collect the farm-fresh', style: 'normal' },
  ];
  ctx.font = topFont;

  let totalW1 = 0;
  const mLine1 = line1Parts.map(p => {
    ctx.font = p.style === 'key' ? `600 ${topFontSize - 2}px ${FONT}` : topFont;
    const tw = ctx.measureText(p.text.trim()).width;
    const pw = p.style === 'key' ? tw + 16 : ctx.measureText(p.text).width;
    totalW1 += pw;
    return { ...p, w: pw, tw };
  });

  let lx = (w - totalW1) / 2;
  mLine1.forEach(p => {
    if (p.style === 'key') {
      const kx = lx, ky = topY1 - topFontSize / 2 - 2;
      const kw = p.w, kh = topFontSize + 6;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      roundRect(kx, ky, kw, kh, 5);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      roundRect(kx, ky, kw, kh, 5);
      ctx.stroke();
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      roundRect(kx, ky + kh - 4, kw, 4, 2);
      ctx.fill();
      ctx.fillStyle = '#3E2723';
      ctx.font = `600 ${topFontSize - 2}px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text.trim(), kx + kw / 2, topY1);
      ctx.textAlign = 'left';
    } else {
      ctx.fillStyle = topColor;
      ctx.font = topFont;
      ctx.textAlign = 'left';
      ctx.fillText(p.text, lx, topY1);
    }
    lx += p.w;
  });

  // Line 2
  const topY2 = topY1 + topFontSize * 1.8;
  ctx.fillStyle = topColor;
  ctx.font = topFont;
  ctx.textAlign = 'center';
  ctx.fillText('ingredients to fill the pouches', w / 2, topY2);

  // ── CTA — Green pill button ──
  const btnW = 280, btnH = 56;
  const textBottom = topY2 + topFontSize;
  const prizeTop = h - 70;
  const btnX = (w - btnW) / 2;
  const btnY = textBottom + (prizeTop - textBottom - btnH) / 2;
  const hoverScale = signHover ? 1.02 : 1;

  ctx.save();
  const bcx = btnX + btnW / 2;
  const bcy = btnY + btnH / 2;
  ctx.translate(bcx, bcy);
  ctx.scale(hoverScale, hoverScale);
  ctx.translate(-bcx, -bcy);

  ctx.fillStyle = signHover ? '#2D9B3F' : '#3DB54A';
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 100);
  ctx.fill();

  ctx.fillStyle = '#FFF';
  ctx.font = `700 20px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Start Game', bcx, bcy);

  ctx.restore();

  // Store button bounds for click detection
  startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

  // ── BOTTOM LINE — prize ──
  ctx.fillStyle = 'rgba(255,255,255,0.80)';
  ctx.font = `600 18px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  const prizeText = 'Collect ingredients for all 5 pouches to unlock 15% off your next box';
  const prizeMaxW = w - 60;
  const prizeFullW = ctx.measureText(prizeText).width;
  if (prizeFullW > prizeMaxW) {
    const prizeLine1 = 'Collect ingredients for all 5 pouches';
    const prizeLine2 = 'to unlock 15% off your next box';
    ctx.fillText(prizeLine1, w / 2, h - 90);
    ctx.fillText(prizeLine2, w / 2, h - 68);
  } else {
    ctx.fillText(prizeText, w / 2, h - 74);
  }
}

let startBtn = null;

// ── Helper: draw framed popup card ──
function drawPopupFrame(px, py, pw, ph) {
  const frameW = 8;
  const gap = 4;
  const cornerSize = 14;
  const boltR = 5;

  // Drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 32;
  ctx.shadowOffsetY = 8;
  ctx.fillStyle = '#8B5E3C';
  roundRect(px, py, pw, ph, 20);
  ctx.fill();
  ctx.restore();

  // Outer wood frame
  ctx.fillStyle = '#8B5E3C';
  roundRect(px, py, pw, ph, 20);
  ctx.fill();

  // Dark gap layer
  ctx.fillStyle = '#6B4226';
  roundRect(px + frameW - gap, py + frameW - gap, pw - (frameW - gap) * 2, ph - (frameW - gap) * 2, 18);
  ctx.fill();

  // Inner cream card
  ctx.fillStyle = '#FFF8EC';
  roundRect(px + frameW, py + frameW, pw - frameW * 2, ph - frameW * 2, 16);
  ctx.fill();

  // Corner bolts
  const boltPositions = [
    { x: px + cornerSize, y: py + cornerSize },
    { x: px + pw - cornerSize, y: py + cornerSize },
    { x: px + cornerSize, y: py + ph - cornerSize },
    { x: px + pw - cornerSize, y: py + ph - cornerSize },
  ];
  boltPositions.forEach(b => {
    ctx.fillStyle = '#C4A052';
    ctx.beginPath(); ctx.arc(b.x, b.y, boltR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#8B7030';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(b.x, b.y, boltR, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(b.x - 1.5, b.y - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();
  });
}

// ── Helper: draw ribbon banner ──
function drawRibbon(cx, y, text, color, rw, rh) {
  const notchD = 10;
  // Main ribbon
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx - rw / 2 - 12, y);
  ctx.lineTo(cx + rw / 2 + 12, y);
  ctx.lineTo(cx + rw / 2 + 12, y + rh);
  ctx.lineTo(cx + rw / 2 + 2, y + rh - notchD);
  ctx.lineTo(cx + rw / 2 - 8, y + rh);
  ctx.lineTo(cx - rw / 2 + 8, y + rh);
  ctx.lineTo(cx - rw / 2 - 2, y + rh - notchD);
  ctx.lineTo(cx - rw / 2 - 12, y + rh);
  ctx.closePath();
  ctx.fill();

  // Subtle darker bottom edge
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(cx - rw / 2 + 10, y + rh - 4, rw - 20, 4);

  // Text
  ctx.fillStyle = '#FFF';
  ctx.font = `800 22px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 2;
  ctx.shadowOffsetY = 1;
  ctx.fillText(text, cx, y + rh / 2);
  ctx.restore();
}

// ── Helper: draw wooden arrow button ──
function drawWoodArrow(cx, cy, aw, ah, text) {
  const pointW = 22;
  const ax = cx - aw / 2;
  const ay = cy - ah / 2;
  function arrowP(x, y, wd, ht, pt) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + wd - pt, y);
    ctx.lineTo(x + wd, y + ht / 2);
    ctx.lineTo(x + wd - pt, y + ht);
    ctx.lineTo(x, y + ht);
    ctx.closePath();
  }
  // Shadow
  ctx.fillStyle = '#4A2E0E';
  arrowP(ax + 2, ay + 3, aw, ah, pointW);
  ctx.fill();
  // Depth
  ctx.fillStyle = '#6B3E1A';
  arrowP(ax + 1, ay + 2, aw, ah, pointW);
  ctx.fill();
  // Face
  ctx.fillStyle = '#8B5E3C';
  arrowP(ax, ay, aw, ah, pointW);
  ctx.fill();
  // Grain
  ctx.strokeStyle = '#7A5232';
  ctx.lineWidth = 0.5;
  ctx.globalAlpha *= 0.3;
  for (let gi = 1; gi <= 3; gi++) {
    ctx.beginPath();
    ctx.moveTo(ax + 6, ay + (ah * gi) / 4);
    ctx.lineTo(ax + aw - pointW - 4, ay + (ah * gi) / 4);
    ctx.stroke();
  }
  ctx.globalAlpha /= 0.3;
  // Text
  ctx.fillStyle = '#FFF8EC';
  ctx.font = `700 16px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 2;
  ctx.shadowOffsetY = 1;
  ctx.fillText(text, ax + (aw - pointW / 2) / 2, cy);
  ctx.restore();
}

// ── Game Over Screen ──
function drawGameOverScreen() {
  const w = W(), h = H();
  const totalCompleted = completedPouches.filter(Boolean).length;
  const allComplete = totalCompleted === 5;

  // Overlay
  ctx.fillStyle = `rgba(0,0,0,${gameOverAlpha * 0.5})`;
  ctx.fillRect(0, 0, w, h);

  // Confetti behind popup for win
  if (allComplete) {
    updateConfetti();
    drawConfetti();
  }

  if (gameOverAlpha < 0.05) return;

  ctx.globalAlpha = gameOverAlpha;

  const panelW = Math.min(520, w - 40);

  if (allComplete) {
    // ═══ WIN POPUP — Clean cream card ═══
    const cx = w / 2;
    const winW = 460;
    const winPadX = 48, winPadY = 40;
    // Content: title(32) + gap(20) + subtitle1(17) + gap(8) + subtitle2(17) + gap(28) + pouchRow(42) + gap(28) + button(56)
    const winContentH = 32 + 20 + 17 + 8 + 17 + 28 + 42 + 28 + 56;
    const winH = winPadY * 2 + winContentH;
    const winX = (w - winW) / 2;
    const winY = (h - winH) / 2;

    // Card shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.20)';
    ctx.shadowBlur = 48;
    ctx.shadowOffsetY = 12;
    ctx.fillStyle = '#FFF8EC';
    ctx.beginPath();
    ctx.roundRect(winX, winY, winW, winH, 28);
    ctx.fill();
    ctx.restore();

    // Grain texture overlay
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(winX, winY, winW, winH, 28);
    ctx.clip();
    ctx.fillStyle = grainCream;
    ctx.fillRect(winX, winY, winW, winH);
    ctx.restore();

    // Floating ingredient decorations at corners
    ctx.save();
    ctx.globalAlpha = 0.5;
    // Top-left — Mango
    ctx.save(); ctx.translate(winX + 30, winY + 28); ctx.rotate(-0.3); ctx.scale(0.9, 0.9);
    drawIngredientArt('Mango', 14); ctx.restore();
    // Top-right — Strawberry
    ctx.save(); ctx.translate(winX + winW - 30, winY + 28); ctx.rotate(0.25); ctx.scale(0.85, 0.85);
    drawIngredientArt('Strawberry', 14); ctx.restore();
    // Bottom-left — Pear
    ctx.save(); ctx.translate(winX + 34, winY + winH - 28); ctx.rotate(0.2); ctx.scale(0.8, 0.8);
    drawIngredientArt('Pear', 14); ctx.restore();
    // Bottom-right — Spinach
    ctx.save(); ctx.translate(winX + winW - 34, winY + winH - 28); ctx.rotate(-0.2); ctx.scale(0.85, 0.85);
    drawIngredientArt('Spinach', 14); ctx.restore();
    ctx.restore();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title
    let ty = winY + winPadY + 16;
    ctx.fillStyle = '#3D3D3D';
    ctx.font = `800 32px ${FONT}`;
    ctx.fillText('Harvest Complete!', cx, ty);

    // Subtitle line 1
    ty += 20 + 17;
    ctx.fillStyle = '#777777';
    ctx.font = `500 17px ${FONT}`;
    ctx.fillText('You harvested ingredients for', cx, ty);

    // Subtitle line 2
    ty += 8 + 17;
    ctx.fillText('all 5 pouches.', cx, ty);

    // Pouch icons row with checkmarks
    ty += 28 + 21;
    const pouchSz = 42;
    const pouchGap = 12;
    const pouchRowW = 5 * pouchSz + 4 * pouchGap;
    const pouchStartX = cx - pouchRowW / 2;
    for (let i = 0; i < 5; i++) {
      const ppx = pouchStartX + i * (pouchSz + pouchGap) + pouchSz / 2;
      drawPouch(ppx, ty, pouchSz, POUCHES[i].color, true, false, POUCHES[i].outline);
      // Green checkmark
      ctx.save();
      ctx.fillStyle = '#3DB54A';
      ctx.beginPath();
      ctx.arc(ppx + pouchSz / 2 - 4, ty + pouchSz / 2 - 4, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(ppx + pouchSz / 2 - 8, ty + pouchSz / 2 - 4);
      ctx.lineTo(ppx + pouchSz / 2 - 5, ty + pouchSz / 2 - 1);
      ctx.lineTo(ppx + pouchSz / 2 - 1, ty + pouchSz / 2 - 8);
      ctx.stroke();
      ctx.restore();
    }

    // CTA button — green pill
    ty += 21 + 28 + 28;
    const btnW = 340, btnH = 56;
