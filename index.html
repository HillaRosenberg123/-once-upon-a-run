    const btnX = cx - btnW / 2;
    const btnY = ty - btnH / 2;
    ctx.fillStyle = '#3DB54A';
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 100);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `700 17px ${FONT}`;
    ctx.fillText('Unlock 15% off your next box', cx, ty);

    gameOverBtns.tryAgain = { x: btnX, y: btnY, w: btnW, h: btnH };

  } else {
    // ═══ GAME OVER POPUP (0-4 pouches) ═══
    const goW = 460;
    const goPadX = 48, goPadY = 48;
    const goContentH = 32 + 20 + 17 + 8 + 17 + 32 + 52;
    const goH = goPadY * 2 + goContentH;
    const goX = (w - goW) / 2;
    const goY = (h - goH) / 2;
    const cx = w / 2;

    // Card shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.20)';
    ctx.shadowBlur = 48;
    ctx.shadowOffsetY = 12;
    ctx.fillStyle = '#FFF8EC';
    ctx.beginPath();
    ctx.roundRect(goX, goY, goW, goH, 28);
    ctx.fill();
    ctx.restore();

    // Grain texture overlay on card
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(goX, goY, goW, goH, 28);
    ctx.clip();
    ctx.fillStyle = grainCream;
    ctx.fillRect(goX, goY, goW, goH);
    ctx.restore();

    // Floating ingredient decorations at corners
    ctx.save();
    ctx.globalAlpha = 0.5;
    // Top-left
    ctx.save(); ctx.translate(goX + 30, goY + 28); ctx.rotate(-0.3); ctx.scale(0.9, 0.9);
    drawIngredientArt('Apple', 14); ctx.restore();
    // Top-right
    ctx.save(); ctx.translate(goX + goW - 30, goY + 28); ctx.rotate(0.25); ctx.scale(0.85, 0.85);
    drawIngredientArt('Carrot', 14); ctx.restore();
    // Bottom-left
    ctx.save(); ctx.translate(goX + 34, goY + goH - 28); ctx.rotate(0.2); ctx.scale(0.8, 0.8);
    drawIngredientArt('Strawberry', 14); ctx.restore();
    // Bottom-right
    ctx.save(); ctx.translate(goX + goW - 34, goY + goH - 28); ctx.rotate(-0.2); ctx.scale(0.85, 0.85);
    drawIngredientArt('Blueberry', 14); ctx.restore();
    ctx.restore();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Header
    let ty = goY + goPadY + 16;
    ctx.fillStyle = '#3D3D3D';
    ctx.font = `800 32px ${FONT}`;
    ctx.fillText('Game Over', cx, ty);

    // Subtitle line 1
    ty += 20 + 17;
    ctx.fillStyle = '#777777';
    ctx.font = `500 17px ${FONT}`;
    ctx.fillText("Oops! You've hit an obstacle.", cx, ty);

    // Subtitle line 2
    ty += 8 + 17;
    ctx.fillText('Pouches filled: ' + totalCompleted + '/5', cx, ty);

    // CTA button
    ty += 32 + 26;
    const btnW = 220, btnH = 52;
    const btnX = cx - btnW / 2;
    const btnY = ty - btnH / 2;
    ctx.fillStyle = '#3DB54A';
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 100);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `700 19px ${FONT}`;
    ctx.fillText('Try Again', cx, ty);

    gameOverBtns.tryAgain = { x: btnX, y: btnY, w: btnW, h: btnH };
  }

  ctx.globalAlpha = 1;
}

let gameOverBtns = {};

// ── Collision ──
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function getFarmerRect() {
  // Slightly smaller hitbox for fairness — scaled 1.16x
  return {
    x: farmer.x - 14,
    y: farmer.y - 70,
    w: 28,
    h: 67
  };
}

// ── Game Logic ──
function jump() {
  if (farmer.jumping) return;
  farmer.jumping = true;
  farmer.vy = -11.5;
  ensureAudio();
}

function updateGame() {
  gameTime += 0.016;

  // Speed progression
  speed = BASE_SPEED + currentPouch * 0.7 + gameTime * 0.02;

  // Farmer
  if (farmer.jumping) {
    farmer.vy += 0.5; // gravity
    farmer.y += farmer.vy;
    if (farmer.y >= groundY) {
      farmer.y = groundY;
      farmer.vy = 0;
      farmer.jumping = false;
    }
  }
  farmer.runTimer += speed * 0.5;

  scrollX += speed;
  distanceTravelled += speed;

  // ── Distance-based spawning with strict alternation ──
  if (distanceTravelled >= nextSpawnX) {
    const variance = (Math.random() - 0.5) * 160; // ±80px
    const scaledSpacing = SPAWN_BASE_SPACING * (BASE_SPEED / speed);
    const spacing = Math.max(SPAWN_MIN_SPACING, scaledSpacing + variance);

    if (spawnStep === 0) {
      // Ingredient
      if (currentPouch < 5) spawnIngredient();
      spawnStep = 1;
    } else if (spawnStep === 2) {
      // Obstacle
      spawnObstacle();
      spawnStep = 3;
    }
    // Steps 1 and 3 are gap steps — just advance
    if (spawnStep === 1 || spawnStep === 3) {
      spawnStep = (spawnStep + 1) % 4;
    }

    nextSpawnX = distanceTravelled + spacing;
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x < -60) obstacles.splice(i, 1);
  }

  // Update ingredients
  for (let i = ingredients.length - 1; i >= 0; i--) {
    const ingr = ingredients[i];
    ingr.x -= speed;
    ingr.bobTimer += 0.05;
    if (ingr.x < -60) ingredients.splice(i, 1);
  }

  // Collision with obstacles
  const farmerRect = getFarmerRect();
  for (const obs of obstacles) {
    if (rectsOverlap(farmerRect, obs)) {
      gameOver();
      return;
    }
  }

  // Collect ingredients
  for (let i = ingredients.length - 1; i >= 0; i--) {
    const ingr = ingredients[i];
    const ingrRect = { x: ingr.x - 14, y: ingr.y + Math.sin(ingr.bobTimer) * 6 - 14, w: 28, h: 28 };
    if (rectsOverlap(farmerRect, ingrRect)) {
      if (currentPouch < 5 && !collectedIngredients[currentPouch].includes(ingr.name)) {
        collectedIngredients[currentPouch].push(ingr.name);
        addSparkle(ingr.x, ingr.y);
        sfxCollect();

        // Check if pouch complete
        if (collectedIngredients[currentPouch].length === 4) {
          completedPouches[currentPouch] = true;
          sfxPouch();
          startPouchCelebration(currentPouch);
          currentPouch++;
          if (currentPouch >= 5) {
            // All done! But game continues until you hit something
          }
        }
      }
      ingredients.splice(i, 1);
    }
  }

  updateSparkles();
}

function gameOver() {
  state = 'gameover';
  gameOverTimer = 0;
  gameOverAlpha = 0;
  gameOverBtns = {};
  sfxGameOver();
  if (completedPouches.filter(Boolean).length === 5) {
    sfxWin();
    setTimeout(() => addConfetti(), 500);
  }
}

// ── Main Loop ──
function gameLoop() {
  const w = W(), h = H();
  groundY = h * 0.65;

  ctx.clearRect(0, 0, w, h);

  if (state === 'start') {
    gameTime += 0.016;
    drawStartScreen();
  } else if (state === 'playing') {
    updateGame();
    drawBackground();
    // Draw obstacles
    obstacles.forEach(drawObstacle);
    // Draw ingredients
    ingredients.forEach(drawIngredient);
    // Draw farmer
    drawFarmer();
    drawSparkles();
    drawHUD();
  } else if (state === 'gameover') {
    // Frozen scene
    drawBackground();
    obstacles.forEach(drawObstacle);
    ingredients.forEach(drawIngredient);
    drawFarmer();
    drawSparkles();
    drawHUD();

    gameOverTimer += 16;
    if (gameOverTimer > 400) {
      gameOverAlpha = Math.min(1, gameOverAlpha + 0.04);
    }
    drawGameOverScreen();
    gameTime += 0.016;
  }

  requestAnimationFrame(gameLoop);
}

// ── Input ──
function handleInput(e) {
  if (e) e.preventDefault();
  ensureAudio();

  if (state === 'start') {
    // Start game
    initGame();
    state = 'playing';
  } else if (state === 'playing') {
    jump();
  } else if (state === 'gameover' && gameOverAlpha > 0.5) {
    // Check buttons via click position
  }
}

function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
  const y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
  // Map CSS pixels to game coordinates (900×500)
  const mx = ((x - rect.left) / rect.width) * GAME_W;
  const my = ((y - rect.top) / rect.height) * GAME_H;

  ensureAudio();

  if (state === 'start') {
    // Check start button
    if (startBtn && mx >= startBtn.x && mx <= startBtn.x + startBtn.w &&
        my >= startBtn.y && my <= startBtn.y + startBtn.h) {
      initGame();
      state = 'playing';
    }
  } else if (state === 'playing') {
    jump();
  } else if (state === 'gameover' && gameOverAlpha > 0.5) {
    if (gameOverBtns.tryAgain) {
      const b = gameOverBtns.tryAgain;
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        initGame();
        state = 'playing';
      }
    }
    if (gameOverBtns.shop) {
      const b = gameOverBtns.shop;
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        window.open('https://www.onceuponafarm.com', '_blank');
      }
    }
  }
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (state === 'start') {
      initGame();
      state = 'playing';
    } else if (state === 'playing') {
      jump();
    } else if (state === 'gameover' && gameOverAlpha > 0.5) {
      initGame();
      state = 'playing';
    }
    ensureAudio();
  }
});

// Mouse / Touch
canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleClick(e);
}, { passive: false });

// Prevent scrolling on mobile when touching canvas
canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

// ── Init & Start ──
initGame();
initBackground();
state = 'start';
gameLoop();

</script>
